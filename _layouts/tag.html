---
layout: default
current: tag
class: 'tag-template'
---

<main id="main" class="site-main">
    <div class="wrap">
        <header class="page-header">
            <p class="overline">Topic</p>
            <h1 class="page-title">#{{ page.tag }}</h1>
            <p class="page-description">A collection of {{ paginator.total_posts }} {% if paginator.total_posts == 1 %}post{% else %}posts{% endif %}.</p>
        </header>
        <div class="post-feed">
            {% for post in paginator.posts %}{% include post-card.html %}{% endfor %}
        </div>
    </div>
</main>
