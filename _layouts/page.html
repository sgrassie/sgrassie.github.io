---
layout: default
---

<main id="main" class="site-main">
    <article class="article article--page wrap wrap--content">
        <header class="article__header">
            <h1 class="article__title">{{ page.title }}</h1>
        </header>
        {% if page.featured_image %}
        <figure class="article__hero">
            <img src="{{ page.featured_image | relative_url }}" alt="{% if page.featured_image_alt %}{{ page.featured_image_alt }}{% else %}{{ page.title }}{% endif %}">
        </figure>
        {% endif %}
        <div class="article__body">
            {{ content }}
        </div>
    </article>
</main>
