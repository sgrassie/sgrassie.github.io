<header id="masthead" class="site-header">
    <div class="wrap site-header__inner">
        <a class="brand" href="{{ '/' | relative_url }}" rel="home">
            <span class="brand__name">Stuart Grassie</span>
            <span class="brand__title">Temporal<em>Cohesion</em></span>
        </a>

        <nav id="site-nav" class="site-nav" aria-label="Main navigation">
            <ul>
                {% for link in site.navigation %}
                {% assign link_url_slash = link.url | append: '/' %}
                <li>
                    <a href="{{ link.url | relative_url }}"{% if page.url == link.url or page.url == link_url_slash %} aria-current="page"{% endif %}>{{ link.text }}</a>
                </li>
                {% endfor %}
            </ul>
        </nav>

        <button id="theme-toggle" class="icon-button theme-toggle" type="button" aria-label="Switch colour theme">
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4m11.4-11.4 1.4-1.4" />
            </svg>
        </button>

        <button id="menu-toggle" class="icon-button menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Menu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
        </button>
    </div>
</header>
